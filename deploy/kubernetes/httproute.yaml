apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: connectivity-server
spec:
  parentRefs:
    - name: istio-gateway
      namespace: istio-system
  hostnames:
    - "connectivity.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: connectivity-server
          port: 8080
